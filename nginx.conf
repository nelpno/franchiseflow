server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA: redirect all routes to index.html (no cache for HTML)
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, must-revalidate" always;
    }

    # Cache static assets — Vite hashed filenames (immutable 1 year)
    location /assets {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        access_log off;
    }

    # Cache PWA manifest + icons (short cache, revalidate)
    location ~* \.(json|svg|png|ico|webmanifest)$ {
        expires 1d;
        add_header Cache-Control "public, must-revalidate" always;
        access_log off;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Gzip — level 6 (better ratio, minimal CPU cost)
    gzip on;
    gzip_comp_level 6;
    gzip_vary on;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml application/wasm;
    gzip_min_length 256;

    # Connection tuning
    keepalive_timeout 65;
    client_max_body_size 25m;
}
